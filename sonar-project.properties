sonar.projectKey=hbelmiro_investing
sonar.organization=hbelmiro
sonar.host.url=https://sonarcloud.io

sonar.sources=src/main/java,src/main/frontend/src
sonar.tests=src/test/java,src/main/frontend/src
sonar.test.inclusions=**/*Test.java,**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/target/**

sonar.java.binaries=target/classes
sonar.java.source=25

sonar.javascript.lcov.reportPaths=src/main/frontend/coverage/lcov.info

# Ignore deprecated code warnings for CDI constructors and unnecessary type assertions
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1133
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*Reader.java
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S4325
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.ts
